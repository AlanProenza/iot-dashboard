<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ThingSpeak Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }

    iframe {
      width: 100%;
      height: 260px;
      border: none;
      border-radius: 10px;
      background: white;
    }
  </style>
</head>

<body>

  <h1>ESP32 Sensor Dashboard</h1>

  <div class="grid">

    <!-- Chart 1 -->
    <iframe src="https://thingspeak.com/channels/3317290/charts/1?bgcolor=%23ffffff&color=%23007bff&dynamic=true&results=60"></iframe>

    <!-- Chart 2 -->
    <iframe src="https://thingspeak.com/channels/3317290/charts/2?bgcolor=%23ffffff&color=%2300cc66&dynamic=true&results=60"></iframe>

    <!-- Chart 3 -->
    <iframe src="https://thingspeak.com/channels/3317290/charts/3?bgcolor=%23ffffff&color=%23ff5733&dynamic=true&results=60"></iframe>

    <!-- Chart 4 -->
    <iframe src="https://thingspeak.com/channels/3317290/charts/4?bgcolor=%23ffffff&color=%23ffa500&dynamic=true&results=60"></iframe>

    <!-- Chart 5 -->
    <iframe src="https://thingspeak.com/channels/3317290/charts/5?bgcolor=%23ffffff&color=%238a2be2&dynamic=true&results=60"></iframe>

    <!-- Chart 6 -->
    <iframe src="https://thingspeak.com/channels/3317290/charts/6?bgcolor=%23ffffff&color=%23ff1493&dynamic=true&results=60"></iframe>

  </div>

</body>
</html>
